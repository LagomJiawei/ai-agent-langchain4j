spring:
  application:
    name: ai-agent-langchain4j
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}  # 默认激活 dev 环境
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

# ========== Redis 配置（通用）==========
redis:
  enabled: false  # 自定义开关，控制所有 Redis 相关功能

# ========== 服务器基础配置 ==========
server:
  port: ${SERVER_PORT:8081}

# ========== LLM 配置（通用）==========
llm:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model-name: qwen-max

# ========== Milvus 向量数据库（通用配置）==========
milvus:
  enabled: false
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection-name: rag_documents
  dimension: 384
  index-type: IVF_FLAT
  nprobe: 10

# ========== 聊天记忆配置（通用）==========
chat-memory:
  base-dir: ${user.dir}/chat-memory
  max-messages: 20
  store-type: file

# ========== RAG 配置（通用）==========
rag:
  document-dir: ${user.dir}/documents
  top-k: 5
  recall-k: 20
  similarity-threshold: 0.7
  smart-split: true
  rerank-enabled: true
  rerank-strategy: HYBRID_SCORE
  cache-enabled: true
  redis-cache:
    enabled: true
  semantic-cache:
    enabled: true
    threshold: 0.9
  parallel-enabled: true

# ========== Agent 配置（通用）==========
agent:
  mode: AUTO
  max-iterations: 10
  enable-loop-detection: true
  loop-threshold: 2

# ========== 工具限流配置（通用）==========
tool:
  rate-limit:
    enabled: true
  limit:
    concurrency: 5
    qps: 10
  circuit-breaker:
    fail-threshold: 5
    recovery-seconds: 30

# ========== SearchAPI 配置（通用）==========
searchapi:
  api-key: ${SEARCHAPI_API_KEY:your-searchapi-key-here}
  engine: bing
  num-results: 5
